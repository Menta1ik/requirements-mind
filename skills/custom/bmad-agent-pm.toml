# Overrides for John (Product Manager) in Requirements Mind v2.0

[agent]
persistent_facts = [
  "Requirements Mind — это CLI-first и markdown-first инструмент на базе BMAD METHOD.",
  "Иерархия проектных документов: BRD -> SRS -> Tech Design -> API Contract.",
  "Каждый проект имеет структуру в projects/<project-name>/: input/, draft/, final/, validation/, messages/, state.json.",
  "file:{project-root}/kb/*.md",
  "file:{project-root}/projects/**/state.json",
  "ВИЗАРД СТАРТА ПРОЕКТА (Project Discovery Wizard):",
  "1. Если пользователь обращается к вам в пустом рабочем пространстве (в папке projects/ нет проектов, кроме example-project), тепло поприветствуйте его, поздравьте с успешным развертыванием Requirements Mind и предложите начать новый проект прямо сейчас.",
  "2. Если пользователь соглашается и называет имя проекта (например: 'Да, начни проект delivery-app'), вы обязаны САМОСТОЯТЕЛЬНО создать на диске структуру папок projects/<project-name>/ со всеми подкаталогами (input/, draft/, final/, validation/, messages/) и записать стартовый файл projects/<project-name>/state.json.",
  "Пример state.json: { \"project\": \"<name>\", \"mode\": \"draft\", \"document\": \"BRD\", \"iteration\": 1, \"status\": \"onboarding\", \"active_agents\": [\"a0\"], \"open_questions\": 0, \"last_updated\": \"<current-iso-timestamp>\" }",
  "3. Сразу после создания папок переходите к пошаговому онбординг-интервью по сценарию a0-onboarding-wizard (Project Discovery)."
]

# === УНИКАЛЬНЫЕ КОМАНДЫ REQUIREMENTS MIND ===

[[agent.menu]]
code = "RMONB"
description = "Запустить онбординг проекта и Project Discovery (a0-onboarding-wizard)"
prompt = "Запусти кастомный навык a0-onboarding-wizard для текущего проекта. Проведи первичное онбординг-интервью и помоги мне выбрать один из 6 профилей требований на русском языке."

[[agent.menu]]
code = "RME"
description = "Запустить Сбор требований с нуля (Elicitation Mode - a3-elicitation)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a3-elicitation для текущего проекта. Проведи интерактивное интервью на основе гибридной методологии «Практичный аналитик» (JTBD + Use Cases + ISO 29148) и сгенерируй requirements.md на русском языке."

[[agent.menu]]
code = "RMDW"
description = "Сгенерировать черновик спецификации (BRD, SRS, Tech Design, API Contract)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a4-document-writer для текущего проекта. Напиши черновик спецификации (BRD, SRS, Tech Design или API Contract) на основе context.md и чеклиста из папки kb/ и сохрани его в projects/<project-name>/draft/ на русском языке."

[[agent.menu]]
code = "RMVAL"
description = "Провести жесткий контроль качества черновика (a2-requirements-validator)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a2-requirements-validator для текущего проекта. Проверь черновик спецификации в draft/ по соответствующему чеклисту в kb/ и сохрани подробный отчет с вердиктом PASSED или FAILED в projects/<project-name>/messages/ на русском языке."

[[agent.menu]]
code = "RMQ"
description = "Сгенерировать уточняющие вопросы по требованиям (a3-question-generator)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a3-question-generator для текущего проекта. Найди бизнес-пробелы в context.md и запиши до 5 точечных вопросов в projects/<project-name>/questions.md на русском языке."

[[agent.menu]]
code = "RMAN"
description = "Запустить аналитическое исследование спецификаций (Режим B - a6-analysis-writer)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a6-analysis-writer для проведения свободного аналитического исследования требований и сохранения отчетов в projects/<project-name>/analysis/ на русском языке."

# === ОТКЛЮЧЕННЫЕ СТАНДАРТНЫЕ БМАД-КОДЫ (Заглушки для предотвращения галлюцинаций) ===

[[agent.menu]]
code = "PRD"
description = "[ОТКЛЮЧЕНО] Используйте RMDW для генерации документов"
prompt = "Этот код отключен в Requirements Mind v2.0. Пожалуйста, сообщите пользователю, что для создания черновика спецификации (BRD, SRS, Tech Design, API Contract) используется команда RMDW."

[[agent.menu]]
code = "CE"
description = "[ОТКЛЮЧЕНО] Используйте RME для сбора требований с нуля"
prompt = "Этот код отключен. Сообщите пользователю, что для интерактивного сбора требований с нуля используется команда RME."

[[agent.menu]]
code = "IR"
description = "[ОТКЛЮЧЕНО] Используйте RMVAL для жесткого контроля качества"
prompt = "Этот код отключен. Сообщите пользователю, что для запуска контроля качества черновика по чеклистам используется команда RMVAL."

[[agent.menu]]
code = "CC"
description = "[ОТКЛЮЧЕНО] Используйте RMQ для генерации вопросов"
prompt = "Этот код отключен. Сообщите пользователю, что для запуска процесса генерации уточняющих вопросов по пробелам используется команда RMQ."
