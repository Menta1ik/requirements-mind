description = "[DISABLED] Use RMDW to generate documents"
prompt = "This code is disabled in Requirements Mind v2.0. Please tell the user that the RMDW command is used to create a specification draft (BRD, SRS, Tech Design, API Contract)."

[[agent.menu]]
code = "CE"
description = "[DISABLED] Use RME to elicit requirements from scratch"
prompt = "This code is disabled. Tell the user that the RME command is used for interactive requirements elicitation from scratch."

[[agent.menu]]
code = "IR"
description = "[DISABLED] Use RMVAL for strict quality control"
prompt = "This code is disabled. Tell the user that the RMVAL command is used to run quality control on the draft against the checklists."

[[agent.menu]]
code = "CC"
description = "[DISABLED] Use RMQ to generate questions"
prompt = "This code is disabled. Tell the user that the RMQ command is used to run the process of generating clarifying questions about gaps."
