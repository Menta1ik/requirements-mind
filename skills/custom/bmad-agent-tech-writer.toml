# Overrides for Paige (Technical Writer) in Requirements Mind v2.0

[agent]
persistent_facts = [
  "Requirements Mind — это CLI-first и markdown-first инструмент на базе BMAD METHOD.",
  "Иерархия проектных документов: BRD -> SRS -> Tech Design -> API Contract.",
  "Каждый проект имеет структуру в projects/<project-name>/: input/, draft/, final/, validation/, messages/, state.json.",
  "file:{project-root}/kb/*.md",
  "file:{project-root}/projects/**/state.json"
]

# === УНИКАЛЬНЫЕ КОМАНДЫ REQUIREMENTS MIND ===

[[agent.menu]]
code = "RMONB"
description = "Запустить онбординг проекта и Project Discovery (a0-onboarding-wizard)"
prompt = "Запусти кастомный навык a0-onboarding-wizard для текущего проекта. Проведи первичное онбординг-интервью и помоги мне выбрать один из 6 профилей требований на русском языке."

[[agent.menu]]
code = "RMDW"
description = "Сгенерировать черновик спецификации (BRD, SRS, Tech Design, API Contract)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a4-document-writer для текущего проекта. Напиши черновик спецификации (BRD, SRS, Tech Design или API Contract) на основе context.md и чеклиста из папки kb/ и сохрани его в projects/<project-name>/draft/ на русском языке."

[[agent.menu]]
code = "RMVAL"
description = "Провести жесткий контроль качества черновика (a2-requirements-validator)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a2-requirements-validator для текущего проекта. Проверь черновик спецификации в draft/ по соответствующему чеклисту в kb/ и сохрани подробный отчет с вердиктом PASSED или FAILED в projects/<project-name>/messages/ на русском языке."

[[agent.menu]]
code = "RMQ"
description = "Сгенерировать уточняющие вопросы по требованиям (a3-question-generator)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a3-question-generator для текущего проекта. Найди бизнес-пробелы в context.md и запиши до 5 точечных вопросов в projects/<project-name>/questions.md на русском языке."

[[agent.menu]]
code = "RMAN"
description = "Запустить аналитическое исследование спецификаций (Режим B - a6-analysis-writer)"
prompt = "Пожалуйста, запусти и выполни кастомный навык a6-analysis-writer для проведения свободного аналитического исследования требований и сохранения отчетов в projects/<project-name>/analysis/ на русском языке."

# === ОТКЛЮЧЕННЫЕ СТАНДАРТНЫЕ БМАД-КОДЫ (Заглушки для предотвращения галлюцинаций) ===

[[agent.menu]]
code = "DP"
description = "[ОТКЛЮЧЕНО] Используйте RMONB для запуска онбординга"
prompt = "Этот код отключен в Requirements Mind v2.0. Пожалуйста, сообщите пользователю, что для запуска онбординга и Project Discovery используется команда RMONB."

[[agent.menu]]
code = "WD"
description = "[ОТКЛЮЧЕНО] Используйте RMDW для написания спецификаций"
prompt = "Этот код отключен. Сообщите пользователю, что для написания спецификаций используется команда RMDW."

[[agent.menu]]
code = "VD"
description = "[ОТКЛЮЧЕНО] Используйте RMVAL для контроля качества"
prompt = "Этот код отключен. Сообщите пользователю, что для запуска жесткой валидации требований используется команда RMVAL."

[[agent.menu]]
code = "MG"
description = "[ОТКЛЮЧЕНО] Схемы Mermaid генерируются внутри RMDW"
prompt = "Этот код отключен. Сообщите пользователю, что схемы и диаграммы Mermaid автоматически генерируются ИИ-агентом A4 в рамках процесса RMDW."

[[agent.menu]]
code = "EC"
description = "[ОТКЛЮЧЕНО] Используйте RMQ для генерации вопросов"
prompt = "Этот код отключен. Сообщите пользователю, что для выявления пробелов и генерации уточняющих вопросов используется команда RMQ."
