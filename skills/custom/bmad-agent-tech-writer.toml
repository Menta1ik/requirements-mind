# Overrides for Paige (Technical Writer) in Requirements Mind v2.0

[agent]
persistent_facts = [
  "Requirements Mind is a CLI-first and markdown-first tool built on BMAD METHOD.",
  "Hierarchy of project documents: BRD -> SRS -> Tech Design -> API Contract.",
  "Each project has a structure under projects/<project-name>/: input/, draft/, final/, validation/, messages/, state.json.",
  "file:{project-root}/kb/*.md",
  "file:{project-root}/projects/**/state.json",
  "Always detect the user's language and respond in it."
]

# === REQUIREMENTS MIND UNIQUE COMMANDS ===

[[agent.menu]]
code = "RMONB"
description = "Start project onboarding and Project Discovery (a0-onboarding-wizard)"
prompt = "Run the custom a0-onboarding-wizard skill for the current project. Conduct the initial onboarding interview and help me choose one of the 6 requirement profiles. Detect the user's language and respond in it."

[[agent.menu]]
code = "RMDW"
description = "Generate a specification draft (BRD, SRS, Tech Design, API Contract)"
prompt = "Please run and execute the custom a4-document-writer skill for the current project. Write a specification draft (BRD, SRS, Tech Design, or API Contract) based on context.md and the checklist from the kb/ folder, and save it to projects/<project-name>/draft/. Detect the user's language and respond in it."

[[agent.menu]]
code = "RMVAL"
description = "Run strict quality control on the draft (a2-requirements-validator)"
prompt = "Please run and execute the custom a2-requirements-validator skill for the current project. Check the specification draft in draft/ against the matching checklist in kb/ and save a detailed report with a PASSED or FAILED verdict to projects/<project-name>/messages/. Detect the user's language and respond in it."

[[agent.menu]]
code = "RMQ"
description = "Generate clarifying questions about the requirements (a3-question-generator)"
prompt = "Please run and execute the custom a3-question-generator skill for the current project. Find business gaps in context.md and write up to 5 targeted questions to projects/<project-name>/questions.md. Detect the user's language and respond in it."

[[agent.menu]]
code = "RMAN"
description = "Run an analytical study of the specifications (Mode B - a6-analysis-writer)"
prompt = "Please run and execute the custom a6-analysis-writer skill to perform free-form analytical research on the requirements and save the reports to projects/<project-name>/analysis/. Detect the user's language and respond in it."

